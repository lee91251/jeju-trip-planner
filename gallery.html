<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>제주 디오라마 — 고르기</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#0a121c; color:#eaf6ff; font-family:"Pretendard",sans-serif; padding:28px 18px 60px; text-align:center;}
  h1{font-size:clamp(22px,4vw,34px); font-weight:800; letter-spacing:-.02em;}
  p.sub{color:#9fc3dd; margin:10px 0 26px; font-size:15px;}
  .grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(340px,1fr)); gap:18px; max-width:1200px; margin:0 auto;}
  .card{background:#0f1d2c; border:1px solid rgba(255,255,255,.1); border-radius:16px; overflow:hidden; box-shadow:0 14px 40px rgba(0,0,0,.4);}
  .card img{width:100%; display:block; aspect-ratio:16/9; object-fit:cover;}
  .tag{display:flex; align-items:center; justify-content:space-between; padding:12px 16px;}
  .tag b{font-size:18px; color:#36e0c8;}
  .tag span{font-size:13px; color:#9fc3dd;}
  .foot{margin-top:30px; color:#7fa6c4; font-size:14px; line-height:1.7;}
</style>
</head>
<body>
  <h1>🌋 제주 디오라마 — 마음에 드는 걸 고르세요</h1>
  <p class="sub">AI로 생성한 4종입니다. "A가 좋아" 처럼 알려주시면, 그걸 인트로 첫 화면으로 넣고 솟아오르는 연출을 입힙니다.<br/>더 만들거나 수정도 됩니다 (예: "B인데 더 따뜻하게").</p>
  <div class="grid">
    <div class="card"><img src="dioA.jpg" alt="A"><div class="tag"><b>A</b><span>깔끔한 타원 화산섬</span></div></div>
    <div class="card"><img src="dioB.jpg" alt="B"><div class="tag"><b>B</b><span>종이지도 위 디오라마 (레퍼런스 그대로)</span></div></div>
    <div class="card"><img src="dioC.jpg" alt="C"><div class="tag"><b>C</b><span>틸트시프트 미니어처</span></div></div>
    <div class="card"><img src="dioD.jpg" alt="D"><div class="tag"><b>D</b><span>극적인 화산섬·바다</span></div></div>
  </div>
  <p class="foot">이미지 출처: Pollinations.ai (무료 생성) · 실제 제주 모양과는 다름(AI 해석) — 원하시면 실제 제주 윤곽에 더 맞게 다시 만들 수 있습니다.</p>
</body>
</html>
